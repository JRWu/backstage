apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: petstore-versioned
  description: The petstore API with multiple versions
  tags:
    - store
    - rest
  annotations:
    api-docs.backstage.io/versions: |
      {
        "v1": "openapi: \"3.0.0\"\ninfo:\n  version: 1.0.0\n  title: Swagger Petstore v1\n  license:\n    name: MIT\nservers:\n  - url: http://petstore.swagger.io/v1\npaths:\n  /pets:\n    get:\n      summary: List all pets\n      operationId: listPets\n      tags:\n        - pets\n      parameters:\n        - name: limit\n          in: query\n          description: How many items to return at one time (max 100)\n          required: false\n          schema:\n            type: integer\n            format: int32\n      responses:\n        '200':\n          description: A paged array of pets\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  type: object\n                  properties:\n                    id:\n                      type: integer\n                    name:\n                      type: string\ncomponents:\n  schemas:\n    Pet:\n      type: object\n      required:\n        - id\n        - name\n      properties:\n        id:\n          type: integer\n          format: int64\n        name:\n          type: string",
        "v2": "openapi: \"3.0.0\"\ninfo:\n  version: 2.0.0\n  title: Swagger Petstore v2\n  license:\n    name: MIT\nservers:\n  - url: http://petstore.swagger.io/v2\npaths:\n  /pets:\n    get:\n      summary: List all pets\n      operationId: listPets\n      tags:\n        - pets\n      parameters:\n        - name: limit\n          in: query\n          description: How many items to return at one time (max 100)\n          required: false\n          schema:\n            type: integer\n            format: int32\n        - name: offset\n          in: query\n          description: Number of items to skip\n          required: false\n          schema:\n            type: integer\n            format: int32\n      responses:\n        '200':\n          description: A paged array of pets\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/Pet'\ncomponents:\n  schemas:\n    Pet:\n      type: object\n      required:\n        - id\n        - name\n      properties:\n        id:\n          type: integer\n          format: int64\n        name:\n          type: string\n        tag:\n          type: string",
        "v3": "openapi: \"3.0.0\"\ninfo:\n  version: 3.0.0\n  title: Swagger Petstore v3\n  license:\n    name: MIT\nservers:\n  - url: http://petstore.swagger.io/v3\npaths:\n  /pets:\n    get:\n      summary: List all pets\n      operationId: listPets\n      tags:\n        - pets\n      parameters:\n        - name: limit\n          in: query\n          description: How many items to return at one time (max 100)\n          required: false\n          schema:\n            type: integer\n            format: int32\n        - name: offset\n          in: query\n          description: Number of items to skip\n          required: false\n          schema:\n            type: integer\n            format: int32\n        - name: filter\n          in: query\n          description: Filter by status\n          required: false\n          schema:\n            type: string\n            enum: [available, pending, sold]\n      responses:\n        '200':\n          description: A paged array of pets\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  data:\n                    type: array\n                    items:\n                      $ref: '#/components/schemas/Pet'\n                  pagination:\n                    type: object\n                    properties:\n                      total:\n                        type: integer\n                      limit:\n                        type: integer\n                      offset:\n                        type: integer\ncomponents:\n  schemas:\n    Pet:\n      type: object\n      required:\n        - id\n        - name\n      properties:\n        id:\n          type: integer\n          format: int64\n        name:\n          type: string\n        tag:\n          type: string\n        status:\n          type: string\n          enum: [available, pending, sold]"
      }
    api-docs.backstage.io/default-version: "v3"
spec:
  type: openapi
  lifecycle: experimental
  owner: team-c
  definition: |
    openapi: "3.0.0"
    info:
      version: 3.0.0
      title: Swagger Petstore v3
      license:
        name: MIT
    servers:
      - url: http://petstore.swagger.io/v3
    paths:
      /pets:
        get:
          summary: List all pets
          operationId: listPets
          tags:
            - pets
          parameters:
            - name: limit
              in: query
              description: How many items to return at one time (max 100)
              required: false
              schema:
                type: integer
                format: int32
            - name: offset
              in: query
              description: Number of items to skip
              required: false
              schema:
                type: integer
                format: int32
            - name: filter
              in: query
              description: Filter by status
              required: false
              schema:
                type: string
                enum: [available, pending, sold]
          responses:
            '200':
              description: A paged array of pets
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Pet'
                      pagination:
                        type: object
                        properties:
                          total:
                            type: integer
                          limit:
                            type: integer
                          offset:
                            type: integer
    components:
      schemas:
        Pet:
          type: object
          required:
            - id
            - name
          properties:
            id:
              type: integer
              format: int64
            name:
              type: string
            tag:
              type: string
            status:
              type: string
              enum: [available, pending, sold]
